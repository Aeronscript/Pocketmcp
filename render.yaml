# Render Blueprint for PocketMCP
# Docs: https://render.com/docs/blueprint-spec
#
# Usage:
#   1. Push this file to the root of your GitHub repo
#   2. On Render dashboard: New + > Blueprint > select repo
#   3. Render auto-detects this file and configures everything
#
# Notes:
#   - Free tier plan (sleeps after 15 min of inactivity, wakes up in ~1 min)
#   - SQLite data is ephemeral on free tier (no persistent disk)
#     -> l'auth est stockée dans data/auth-codes.json (régénéré à chaque startup)
#     -> temp codes (runtime) sont réinitialisés au redémarrage
#   - For production with persistent data, upgrade to a paid plan with disks

services:
  - type: web
    name: pocketmcp
    runtime: node
    plan: free
    buildCommand: bun install && bun run build
    startCommand: bun run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
    healthCheckPath: /
    autoDeploy: true
