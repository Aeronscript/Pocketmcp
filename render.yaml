# Render Blueprint for PocketMCP
# Docs: https://render.com/docs/blueprint-spec
#
# Usage:
#   1. Push this file to the root of your GitHub repo
#   2. On Render dashboard: New + > Blueprint > select repo
#   3. Render auto-detects this file and configures everything
#
# Notes:
#   - Free tier plan (sleeps after 15 min of inactivity, wakes up in ~1 min)
#   - SQLite data is ephemeral on free tier (no persistent disk)
#     -> prisma db push recreates the schema on each startup
#     -> admin code (in repo) persists, temp codes (runtime writes) are reset
#   - For production with persistent data, upgrade to a paid plan with disks
#     or switch to PostgreSQL (Neon/Supabase free tiers)

services:
  - type: web
    name: pocketmcp
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npx prisma db push && npm run start
    envVars:
      - key: DATABASE_URL
        value: file:./db/custom.db
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
    healthCheckPath: /
    autoDeploy: true
